<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>resume | justin makaila</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        line-height: 1.5;
      }

      main {
        margin: 0 auto;
        max-width: 800px;
        padding: 2rem 1rem;
      }

      nav {
        margin-bottom: 1.5rem;
      }

      .export-toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }

      .export-toolbar select {
        padding: 0.4rem 0.5rem;
      }

      .export-status {
        margin: 0;
        font-size: 0.9rem;
        color: #666;
      }

      pre {
        overflow-x: auto;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: rgba(127, 127, 127, 0.15);
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      blockquote {
        border-left: 4px solid #999;
        margin-left: 0;
        padding-left: 1rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <a href="/">← home</a>
      </nav>

      <section class="export-toolbar" aria-label="Export actions">
        <label for="resume-export-action">Export:</label>
        <select id="resume-export-action">
          <option value="">Select action…</option>
          <option value="copy-markdown">Copy as markdown</option>
          <option value="export-pdf">Export PDF</option>
        </select>
        <p id="resume-export-status" class="export-status" aria-live="polite"></p>
      </section>

      <article id="resume-content" aria-live="polite">Loading resume…</article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/public/exportable-page.js"></script>
    <script>
      window.initExportablePage({
        contentId: 'resume-content',
        exportActionId: 'resume-export-action',
        exportStatusId: 'resume-export-status',
        markdownPath: '/public/resume.md',
        missingMarkdownError: 'Resume markdown was not found.',
        fallbackHeading: '<h1>Resume</h1>',
        fallbackBody: '<p>Resume content is not available yet.</p>',
        pdfFilename: 'resume.pdf',
      });
    </script>
  </body>
</html>
